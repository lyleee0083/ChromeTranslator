<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Translator 设置</title>
    <style>
      body {
        margin: 0;
        background: #ffffff;
        color: #111827;
        font-family: Arial, "Helvetica Neue", sans-serif;
      }

      main {
        box-sizing: border-box;
        max-width: 720px;
        padding: 28px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 20px;
        line-height: 1.25;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }

      section {
        margin-top: 24px;
      }

      input[type="password"],
      input[type="number"],
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 10px;
        color: #111827;
        font: 14px/1.45 Arial, "Helvetica Neue", sans-serif;
      }

      input[type="password"] {
        min-height: 36px;
      }

      input[type="number"],
      select {
        min-height: 36px;
      }

      .limit-grid {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 10px;
        align-items: end;
        margin-top: 12px;
      }

      textarea {
        min-height: 220px;
        resize: vertical;
      }

      input[type="search"] {
        box-sizing: border-box;
        width: 100%;
        min-height: 36px;
        margin-bottom: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 0 10px;
        color: #111827;
        font: 14px Arial, "Helvetica Neue", sans-serif;
      }

      .search-result {
        min-height: 18px;
        margin: 0 0 10px;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.4;
      }

      .search-result.match {
        color: #047857;
      }

      .search-result.miss {
        color: #b91c1c;
      }

      button {
        min-height: 36px;
        margin-top: 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #f9fafb;
        color: #111827;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        padding: 0 14px;
      }

      #saveStatus {
        min-height: 18px;
        margin-top: 10px;
        color: #047857;
        font-size: 12px;
      }

      .hint,
      .status-line {
        margin: 8px 0 0;
        color: #4b5563;
        font-size: 12px;
        line-height: 1.5;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0 0;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }

      .checkbox-row input {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chrome Translator 设置</h1>
      <section>
        <h2>DeepL 润色密钥</h2>
        <label for="deeplApiKey">DeepL API Key</label>
        <input id="deeplApiKey" type="password" placeholder="用于本地持久化缓存核对润色" autocomplete="off" spellcheck="false">
        <p id="deeplKeyStatus" class="status-line" aria-live="polite"></p>
        <p class="hint">在线翻译使用 Google 接口。DeepL 仅读取本地持久化缓存条目进行核对润色后写回，不参与首次网络翻译。</p>
        <button id="saveDeepLApiKey" type="button">保存密钥</button>
      </section>
      <section>
        <label for="excludedTranslationHostsSearch">搜索域名</label>
        <input id="excludedTranslationHostsSearch" type="search" placeholder="example.com 或 https://www.example.com/page" spellcheck="false">
        <div id="excludedTranslationHostsSearchResult" class="search-result" aria-live="polite"></div>
        <label for="excludedTranslationHosts">排除域名列表</label>
        <textarea id="excludedTranslationHosts" spellcheck="false"></textarea>
        <button id="saveExcludedTranslationHosts" type="button">保存</button>
      </section>
      <section>
        <label for="protectedTermSearch">查询保护词</label>
        <input id="protectedTermSearch" type="search" placeholder="输入要查询的单词或短语" spellcheck="false">
        <div id="protectedTermSearchResult" class="search-result" aria-live="polite"></div>
        <label for="userProtectedTerms">不翻译词库（每行一个）</label>
        <textarea id="userProtectedTerms" spellcheck="false" placeholder="Tesla&#10;NVIDIA&#10;YouTube&#10;API"></textarea>
        <button id="addProtectedTermFromSearch" type="button">添加查询词到自定义词库</button>
        <button id="saveUserProtectedTerms" type="button">保存不翻译词库</button>
        <button id="resetUserProtectedTerms" type="button">恢复默认词库</button>
      </section>
      <section>
        <label>缓存统计</label>
        <div id="cacheStats" class="status-line"></div>
        <label class="checkbox-row">
          <input id="autoCacheCleanupEnabled" type="checkbox">
          <span>自动清理本地持久化缓存</span>
        </label>
        <p class="hint">关闭时不会自动按时间、容量或命中次数裁剪持久缓存，手动清理仍可使用。</p>
        <button id="refreshCacheStats" type="button">刷新缓存统计</button>
        <button id="clearAllCache" type="button">清空全部缓存</button>
        <label for="clearLanguageCacheInput">清空指定语言缓存</label>
        <input id="clearLanguageCacheInput" type="search" placeholder="例如 zh-CN" spellcheck="false">
        <button id="clearLanguageCache" type="button">清空该语言缓存</button>
        <label for="clearSiteCacheInput">清空指定站点缓存</label>
        <input id="clearSiteCacheInput" type="search" placeholder="example.com 或 https://example.com/page" spellcheck="false">
        <button id="clearSiteCache" type="button">清空该站点缓存</button>
      </section>
      <div id="saveStatus" aria-live="polite"></div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
